name: Collector

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  collect:
    name: Run market collector
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Log run start
        run: |
          echo "Collector run starting"
          echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Print Node.js version
        run: node -v && npm -v

      - name: Install dependencies
        run: npm ci

      - name: Test Supabase connectivity
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_URL secret is empty or missing."
            exit 1
          fi
          # Trim whitespace/quotes that sometimes get pasted into secrets.
          URL="$(printf '%s' "$NEXT_PUBLIC_SUPABASE_URL" | tr -d '\r\n' | sed -e 's/^[[:space:]"'\'']*//' -e 's/[[:space:]"'\'']*$//')"
          echo "Configured host: $(node -e "try { console.log(new URL(process.argv[1]).host) } catch { console.log('INVALID_URL') }" "$URL")"
          if ! node -e "new URL(process.argv[1])" "$URL"; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_URL is not a valid URL."
            exit 1
          fi
          ORIGIN="$(node -e "console.log(new URL(process.argv[1]).origin)" "$URL")"
          echo "Testing connectivity to: ${ORIGIN}"
          curl -fsS -I -o /dev/null -w "http_status=%{http_code}\n" "${ORIGIN}" || {
            echo "ERROR: curl could not reach Supabase. Check the Project URL secret and that the project is not paused."
            exit 1
          }
          echo "Supabase host reachable."

      - name: Run collector ingestion
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COLLECTOR_SOURCE: kalshi
        run: npm run ingest:ci

      - name: Log run success
        if: success()
        run: |
          echo "Collector run succeeded"
          echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Ingestion counts are in the previous step logs."

      - name: Failure notification placeholder
        if: failure()
        run: |
          echo "Collector run failed."
          echo "TODO: wire Slack/email/webhook notifications here."
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
